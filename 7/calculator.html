<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

     <style>
        body {
            background: #f1f5ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            width: 300px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 18px;
            color: #2b2e4a;
        }

        #calculator {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        #display {
            grid-column: span 3;
            height: 50px;
            text-align: right;
            padding: 10px;
            font-size: 22px;
            border-radius: 10px;
            border: 2px solid #b8c1ff;
            background: white;
            font-weight: bold;
        }

        button {
            height: 45px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .number {
            background: white;
            color: #2b2e4a;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }

        .number:hover {
            background: #dfe5ff;
        }

        .operator {
            background: #ffb347;
            color: white;
        }

        .operator:hover {
            background: #ff9a1f;
        }

        .equal {
            background: #2ecc71;
            color: white;
        }

        .equal:hover {
            background: #27ae60;
        }

        .clear {
            background: #ff5c5c;
            color: white;
        }

        .clear:hover {
            background: #e04343;
        }
    </style> 
</head>

<body>

    <div class="box">
        <h1>Simple Calculator</h1>

        <div id="calculator">
            <input type="text" id="display" readonly>

            <button class="number" onclick="press('7')">7</button>
            <button class="number" onclick="press('8')">8</button>
            <button class="number" onclick="press('9')">9</button>

            <button class="number" onclick="press('4')">4</button>
            <button class="number" onclick="press('5')">5</button>
            <button class="number" onclick="press('6')">6</button>

            <button class="number" onclick="press('1')">1</button>
            <button class="number" onclick="press('2')">2</button>
            <button class="number" onclick="press('3')">3</button>

            <button class="equal" onclick="calculate()">=</button>
            <button class="number" onclick="press('0')">0</button>
            <button class="clear" onclick="clearDisplay()">C</button>

            <button class="operator" onclick="press('+')">+</button>
            <button class="operator" onclick="press('-')">-</button>
            <button class="operator" onclick="press('*')">*</button>

            <button class="operator" onclick="press('/')">/</button>
            <button class="operator" onclick="press('%')">%</button>
            <button class="operator" onclick="press('^')">^</button>
        </div>
    </div>

    <script>
        function press(value) {
            document.getElementById("display").value += value;
        }

        function calculate() {
            try {
                let expression = document
                    .getElementById("display")
                    .value.replace(/\^/g, "**");

                let result = eval(expression);

                document.getElementById("display").value = result;
            } 
            catch {
                document.getElementById("display").value = "Error";
            }
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }
    </script>

</body>
</html>
