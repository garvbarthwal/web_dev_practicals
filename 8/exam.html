<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Examination Registration</title>
<style>
body{
background: #f2f5f9;
}
header{
background: lightblue;
color:rgb(10, 1, 1);
padding:15px 40px;
display:flex;
text-align: center;
border-radius: 5px;
}
header h1{
font-size:23px;
font-weight:bold;
text-align: center;
}
.container{
width:420px;
margin:90px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
text-align:center;
}
.container p{
font-size:20px;
margin:20px 0;
}
button{
padding:14px 26px;
font-size:18px;
background:#184784;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
button:hover{
background:#0a2249;
}
</style>
</head>
<body>
<div class="container">
<img src="geuLogo.png" alt="Logo" style="height:80px; margin-bottom:20px;">
<header>
<h1>Online Examination Registration</h1>
</header>
<p>Click the button below to register for the upcoming examination.</p>
<button onclick="register()">Register</button>
</div>
<script>
function register(){
alert("Important Instructions:\nCarry your ID Card & Reach 15 minutes early.");
let name = prompt("Enter your Name or Registration Number:");
if(name == null){
alert("Registration Failed! You must enter details.");
return;
}
let result = confirm(name + ", Do you want to confirm your registration?");
if(result){
let admit = window.open("admitcard.html","_blank","width=500,height=400");
}
else{
alert("Registration Cancelled.");
}
}
</script>
</body>
</html>
