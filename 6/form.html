<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <style>
        form {
            width: 60%;
            height: auto;
            margin: auto;
            padding: 20px;
            border: 2px solid rgb(162, 202, 237);
            border-radius: 10px;
            box-shadow: 0 0 10px rgb(162, 202, 237);
        }

        label {
            display: inline-block;
            width: 120px;
            padding: 5px;
            align-items: center;
        }

        input {
            padding: 5px;
            margin: 2px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="submit.html" method="get">
        <header>
            <img 
                src="geuLogo.png" 
                alt="universitylogo" 
                style="width:200px; height:auto; align:middle;"
            >

            <h2>Student Feedback Form</h2>

            <marquee>Graphic Era University, Dehradun</marquee>
        </header>

        <label for="name">Name:</label>
        <input 
            type="text" 
            id="name" 
            name="name" 
            minlength="3" 
            maxlength="30" 
            required
        >
        <br>

        <label for="email">Email:</label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            pattern="[0-9]+@geu.ac.in" 
            required
        >
        <br>

        <label for="course">Course Selected</label>
        <select id="course" name="course" required>
            <option value="Btech">Btech</option>
            <option value="BBA">BBA</option>
            <option value="BCA">BCA</option>
            <option value="MTech">MTech</option>
            <option value="MBA">MBA</option>
            <option value="MCA">MCA</option>
        </select>
        <br>

        <label for="feedback">Feedback:</label>
        <br>
        <textarea 
            id="feedback" 
            name="feedback" 
            rows="4" 
            cols="50" 
            required
        ></textarea>
        <br>

        <input 
            type="submit" 
            value="Submit" 
            style="
                color: white; 
                background-color: cadetblue; 
                cursor: pointer;
                padding: 10px; 
                border-radius: 5px;
            "
        >
    </form>
</body>
</html>
